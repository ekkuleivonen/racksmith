name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main, stable]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint-client-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: client/backend/uv.lock

      - name: Install dependencies
        working-directory: client/backend
        run: uv sync --frozen

      - name: Ruff check
        working-directory: client/backend
        run: uv run ruff check .

      - name: Mypy
        working-directory: client/backend
        run: uv run mypy .

  lint-registry-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: registry/backend/uv.lock

      - name: Install dependencies
        working-directory: registry/backend
        run: uv sync --frozen

      - name: Ruff check
        working-directory: registry/backend
        run: uv run ruff check .

      - name: Mypy
        working-directory: registry/backend
        run: uv run mypy .

  lint-client-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/frontend/package-lock.json

      - name: Install dependencies
        working-directory: client/frontend
        run: npm ci

      - name: Typecheck
        working-directory: client/frontend
        run: npx tsc -b

      - name: Lint
        working-directory: client/frontend
        run: npm run lint

  # ── Tests ────────────────────────────────────────────────────────────────────
  test-client-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: client/backend/uv.lock

      - name: Install dependencies
        working-directory: client/backend
        run: uv sync --frozen

      - name: Run pytest
        working-directory: client/backend
        run: uv run python -m pytest -v

  # ── Security scanning ───────────────────────────────────────────────────────
  audit-client-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: client/backend/uv.lock

      - name: Install dependencies
        working-directory: client/backend
        run: uv sync --frozen

      - name: pip-audit
        working-directory: client/backend
        run: uv run pip-audit

  audit-registry-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: registry/backend/uv.lock

      - name: Install dependencies
        working-directory: registry/backend
        run: uv sync --frozen

      - name: pip-audit
        working-directory: registry/backend
        run: uv run pip-audit

  audit-client-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/frontend/package-lock.json

      - name: Install dependencies
        working-directory: client/frontend
        run: npm ci

      - name: npm audit
        working-directory: client/frontend
        run: npm audit --omit=dev

  # ── Build per-platform images (native runners, no QEMU) ─────────────────────
  build:
    if: github.event_name == 'push'
    needs:
      - lint-client-backend
      - lint-registry-backend
      - lint-client-frontend
      - test-client-backend
      - audit-client-backend
      - audit-registry-backend
      - audit-client-frontend
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: racksmith-client
            dockerfile: client/Dockerfile.client
            context: .
            platform: linux/amd64
            runner: ubuntu-latest
          - name: racksmith-client
            dockerfile: client/Dockerfile.client
            context: .
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - name: racksmith-registry
            dockerfile: registry/backend/Dockerfile
            context: .
            platform: linux/amd64
            runner: ubuntu-latest
          - name: racksmith-registry
            dockerfile: registry/backend/Dockerfile
            context: .
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - name: racksmith-landing
            dockerfile: landing/Dockerfile
            context: landing
            platform: linux/amd64
            runner: ubuntu-latest
          - name: racksmith-landing
            dockerfile: landing/Dockerfile
            context: landing
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v6

      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          build-args: |
            RACKSMITH_VERSION=${{ steps.version.outputs.version }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.name }}:cache-${{ matrix.platform == 'linux/arm64' && 'arm64' || 'amd64' }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.name }}:cache-${{ matrix.platform == 'linux/arm64' && 'arm64' || 'amd64' }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.name }}-${{ matrix.platform == 'linux/arm64' && 'arm64' || 'amd64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Merge per-platform digests into multi-arch manifest ────────────────────
  manifest:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        name: [racksmith-client, racksmith-registry, racksmith-landing]

    steps:
      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.name }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.name }}
          VERSION=${{ steps.version.outputs.version }}
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)

  # ── Security scanning (after manifest is assembled) ────────────────────────
  trivy:
    needs: [manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    strategy:
      matrix:
        name: [racksmith-client, racksmith-registry, racksmith-landing]

    steps:
      - name: Set version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.name }}:${{ steps.version.outputs.version }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  # ── GitHub Release (tag pushes only) ───────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [trivy]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
