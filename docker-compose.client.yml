# Single-container Racksmith client deployment
# Bundles backend, worker, Redis, and frontend in one image.
# Registry and PostgreSQL stay external (cloud-hosted).

services:
  racksmith-client:
    image: ghcr.io/ekkuleivonen/racksmith-client:latest
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./workspace:/app/workspace
    environment:
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      APP_URL: ${APP_URL:-http://localhost:8080}
      REGISTRY_URL: ${REGISTRY_URL:-https://registry.racksmith.io}
    restart: unless-stopped
