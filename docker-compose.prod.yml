# Production: client + registry + registry-db
# Expose via cloudflared tunnels:
#   - Client:  https://racksmith.elei.io
#   - Registry: https://racksmith-registry.elei.io
#
# =============================================================================
# MUST have env vars (set in .env)
# =============================================================================
#
# CLIENT (racksmith-client):
#   APP_URL              — Public URL of the client (e.g. https://racksmith.elei.io)
#   REGISTRY_URL         — Registry API URL (e.g. https://racksmith-registry.elei.io)
#
# REGISTRY:
#   GITHUB_CLIENT_ID     — OAuth App Client ID
#   GITHUB_CLIENT_SECRET — OAuth App Client Secret
#   TOKEN_ENCRYPTION_KEY — Fernet key (generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
#   REGISTRY_PUBLIC_URL  — Public URL of the registry (e.g. https://racksmith-registry.elei.io)
#   REGISTRY_DB_PASSWORD — PostgreSQL password (also used by registry-db)
#
# GitHub OAuth App: set Authorization callback URL to {REGISTRY_PUBLIC_URL}/auth/callback
#
# =============================================================================

services:
  client:
    image: ghcr.io/ekkuleivonen/racksmith-client:${RACKSMITH_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      APP_URL: ${APP_URL}
      REGISTRY_URL: ${REGISTRY_URL}
    volumes:
      - ./data:/app/data
      - ./workspace:/app/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/api/version"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  registry-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: registry
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: ${REGISTRY_DB_PASSWORD}
    volumes:
      - registry_db_data:/var/lib/postgresql/data

  registry:
    image: ghcr.io/ekkuleivonen/racksmith-registry:${RACKSMITH_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://registry:${REGISTRY_DB_PASSWORD}@registry-db/registry
      REGISTRY_PUBLIC_URL: ${REGISTRY_PUBLIC_URL}
    depends_on:
      registry-db:
        condition: service_started

  watchtower:
    image: nickfedor/watchtower
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro
    restart: unless-stopped

volumes:
  registry_db_data:
