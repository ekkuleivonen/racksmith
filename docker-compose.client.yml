# Racksmith Client — 4-service split
#
# MUST have env vars (set in .env):
#   APP_URL      — Public URL of the client (e.g. http://localhost:8080)
#   DAEMON_SECRET — Shared secret between API and daemon
#
# Daemon uses network_mode: host (arp-scan). Therefore:
#   - Redis publishes 127.0.0.1:6379 so the daemon can reach it via REDIS_URL=redis://127.0.0.1:6379
#   - API uses host.docker.internal:8001 to reach the daemon (not the service name "daemon")
#
# Logging: json-file rotation caps disk use (important on Raspberry Pi / SD cards).

x-logging: &log-rotated
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *log-rotated
    ports:
      # Loopback only — daemon (host network) uses 127.0.0.1:6379; not exposed on LAN
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data/redis:/data

  api:
    image: ghcr.io/ekkuleivonen/racksmith-client-api:${RACKSMITH_VERSION:-latest}
    restart: unless-stopped
    logging: *log-rotated
    depends_on: [redis]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/workspace:/app/workspace
      - ./data:/data
    environment:
      REDIS_URL: redis://redis:6379
      # host-gateway: daemon listens on host :8001 (network_mode: host); "daemon" DNS is unreachable from bridge
      DAEMON_URL: http://host.docker.internal:8001
      DAEMON_SECRET: ${DAEMON_SECRET}
    env_file: [.env]

  daemon:
    image: ghcr.io/ekkuleivonen/racksmith-client-daemon:${RACKSMITH_VERSION:-latest}
    restart: unless-stopped
    logging: *log-rotated
    depends_on: [redis]
    network_mode: host
    volumes:
      - ./data:/data
    environment:
      REDIS_URL: redis://127.0.0.1:6379
      DAEMON_SECRET: ${DAEMON_SECRET}

  frontend:
    image: ghcr.io/ekkuleivonen/racksmith-client-frontend:${RACKSMITH_VERSION:-latest}
    restart: unless-stopped
    logging: *log-rotated
    ports:
      - "8080:80"
    depends_on: [api]

  watchtower:
    image: nickfedor/watchtower
    logging: *log-rotated
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro
    restart: unless-stopped
