server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API requests reverse-proxied to the backend service.
    # In docker-compose the upstream is "app:8000".
    # In k3s, replace with the Service name (e.g. racksmith-api.racksmith.svc).
    location /api/ {
        proxy_pass http://app:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;

        # large file uploads
        client_max_body_size 512m;
    }

    # SPA: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
