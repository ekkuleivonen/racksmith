services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    image: ghcr.io/ekkuleivonen/racksmith-app:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      DB_PATH: /app/data/racksmith.db
      REPOS_WORKSPACE: /app/workspace
      REGISTRY_URL: http://registry:8001
    volumes:
      - ./data:/app/data
      - ./workspace:/app/workspace
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import socket; s=socket.create_connection(('localhost',8000),2); s.close()"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  worker:
    image: ghcr.io/ekkuleivonen/racksmith-app:latest
    restart: unless-stopped
    command: ["uv", "run", "python", "run_worker.py", "worker.settings.WorkerSettings"]
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      DB_PATH: /app/data/racksmith.db
      REPOS_WORKSPACE: /app/workspace
      REGISTRY_URL: http://registry:8001
    volumes:
      - ./data:/app/data
      - ./workspace:/app/workspace
    depends_on:
      - redis

  frontend:
    image: ghcr.io/ekkuleivonen/racksmith-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      app:
        condition: service_healthy

  registry-db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: registry
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: ${REGISTRY_DB_PASSWORD}
    volumes:
      - registry_db_data:/var/lib/postgresql/data

  registry:
    image: ghcr.io/ekkuleivonen/racksmith-registry:latest
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://registry:${REGISTRY_DB_PASSWORD}@registry-db/registry
    depends_on:
      registry-db:
        condition: service_started

  watchtower:
    image: nickfedor/watchtower
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.docker/config.json:/config.json:ro
    restart: unless-stopped

volumes:
  redis_data:
  registry_db_data:
