[supervisord]
nodaemon=true

[program:daemon]
command=uv run uvicorn main:app --host 0.0.0.0 --port 8001
directory=/app/daemon
user=racksmith
environment=HOME="/app/daemon"
autorestart=true
startsecs=5
startretries=5
stopsignal=INT
stopwaitsecs=30
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:worker]
command=uv run python run_worker.py worker.settings.WorkerSettings
directory=/app/daemon
user=racksmith
environment=HOME="/app/daemon"
autorestart=true
startsecs=5
startretries=5
stopsignal=TERM
stopwaitsecs=30
killasgroup=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
