<svg
  width="512"
  height="512"
  viewBox="0 0 512 512"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <style>
      .soft { stroke: var(--color-border, #2a2a2a); }
      .bg { fill: var(--color-card, #111111); }
      .hammer {
        fill: #3b82f6;
        stroke: #1d4ed8;
        stroke-width: 6;
        stroke-linejoin: round;
        stroke-linecap: round;
      }
    </style>
  </defs>

  <rect x="56" y="56" width="400" height="400" rx="48" class="bg soft" stroke-width="2"/>

  <!-- Side profile: wide flat face (left), short peen (right), haft ⊥ head -->
  <g transform="translate(256 256) rotate(-38) translate(0 -78)">
    <path
      d="M -10 172
         L -10 22
         L -92 22
         L -92 -22
         L -16 -22
         L 40 -5
         L 48 0
         L 40 5
         L -16 22
         L 10 22
         L 10 172
         Q 10 180 0 180
         Q -10 180 -10 172
         Z"
      class="hammer"
    />
  </g>
</svg>
