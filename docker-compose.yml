services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: racksmith-app:dev

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: racksmith-app:dev

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    image: racksmith-frontend:dev

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  watchtower:
    profiles: [disabled]
