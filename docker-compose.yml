services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: racksmith-app:dev
    environment:
      REGISTRY_URL: http://registry:8001

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: racksmith-app:dev

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    image: racksmith-frontend:dev

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  registry-db:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: registry
      POSTGRES_USER: registry
      POSTGRES_PASSWORD: registry

  registry:
    build:
      context: .
      dockerfile: registry/Dockerfile
    image: racksmith-registry:dev
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://registry:registry@registry-db/registry
      REGISTRY_PUBLIC_URL: http://localhost:8001
    depends_on:
      - registry-db

  watchtower:
    profiles: [disabled]
