- name: Set system hostname
  ansible.builtin.hostname:
    name: '{{ target_hostname }}'
    use: debian
- name: Ensure /etc/hosts contains localhost mapping for hostname
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: ^127\.0\.1\.1\s+
    line: 127.0.1.1 {{ target_hostname }}
    create: true
    state: present
